name: awen-prod-test

services:
  awen-server:
    build:
      context: server
      target: prod
      dockerfile: Dockerfile
      args:
        - APP_VERSION=2026.5.15
    image: awen-server
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    deploy:
      resources:
        limits: { cpus: "${SERVER_CPU:-1}", memory: "${SERVER_MEMORY:-2G}" }
    volumes:
      - ./config:/awen-config:r
    environment:
      AWEN_APP_NAME: ${AWEN_APP_NAME}
      AWEN_APP_PREFIX: ${AWEN_APP_PREFIX}
      AWEN_APP_DESCRIPTION: ${AWEN_APP_DESCRIPTION}
      AWEN_APP_FAVICON: ${AWEN_APP_FAVICON}
      AWEN_APP_HOST: ${AWEN_APP_HOST}
      AWEN_SERVER_PORT: ${AWEN_SERVER_PORT}
      AWEN_GCORE: ${AWEN_GCORE}
      AWEN_GCORE_RAMEN: ${AWEN_GCORE_RAMEN}
      AWEN_GCORE_PROJECT: ${AWEN_GCORE_PROJECT}
      AWEN_DB_HOST: ${AWEN_DB_HOST}
      AWEN_DB_PASSWORD: ${AWEN_DB_PASSWORD}
      AWEN_DB_PORT: ${AWEN_DB_PORT}
      AWEN_DB_USER: ${AWEN_DB_USER}
      AWEN_DB_SCHEME: ${AWEN_DB_SCHEME}
      AWEN_DB_NAME: ${AWEN_DB_NAME}
    networks:
      - traefik-public
      - awen-internal
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${AWEN_SERVER_PORT:-3000}/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.awen-server.rule=(Host(`${THM_HOST}`) || Host(`${HOST}`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.awen-server.tls=true"
      - "traefik.http.routers.awen-server.entrypoints=https"
      - "traefik.http.services.awen-server.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.awenserverauth.basicauth.users=${BASIC_AUTH_STR}"
      - "traefik.http.routers.awen-server.middlewares=awenserverauth"


  awen-client:
    build:
      context: client
      target: prod
      dockerfile: Dockerfile
    image: em-frontend
    restart: unless-stopped
    read_only: true
    environment:
      AWEN_APP_NAME: ${AWEN_APP_NAME}
      AWEN_APP_PREFIX: ${AWEN_APP_PREFIX}
      AWEN_APP_FAVICON: ${AWEN_APP_FAVICON}
      AWEN_APP_HOST: ${AWEN_APP_HOST}
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits: { cpus: "${CLIENT_CPU:-0.5}", memory: "${CLIENT_MEMORY:-1G}" }
    networks:
      - traefik-public
      - awen-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.awen-client.rule=Host(`${THM_HOST}`) || Host(`${HOST}`)"
      - "traefik.http.routers.awen-client.tls=true"
      - "traefik.http.routers.awen-client.entrypoints=https"
      - "traefik.http.services.awen-client.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.awenclientauth.basicauth.users=${BASIC_AUTH_STR}"
      - "traefik.http.routers.awen-client.middlewares=awenclientauth"



  neo4j:
    container_name: neo4j
    image: neo4j:2026.04
    restart: unless-stopped
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    healthcheck:
      test: /var/lib/neo4j/bin/cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} "show databases;"
      start_period: 20s
    environment:
      NEO4J_server_memory_heap_max__size: "${NEO4J_MAX_HEAP:-2G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-2G}"
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_dbms_security_auth__enabled: "true"
      NEO4J_server_databases_default__to__read__only: "false"
      NEO4J_PLUGINS: '["apoc", "apoc-extended"]'

      NEO4J_server_bolt_tls__level: "DISABLED"
      NEO4J_server_https_enabled: "false"
      NEO4J_server_http_enabled: "true"
      NEO4J_server_bolt_listen__address: "0.0.0.0:7687"
      NEO4J_server_https_listen__address: "0.0.0.0:7474"
      NEO4J_dbms_ssl_policy_bolt_enabled: "false"
      NEO4J_dbms_ssl_policy_https_enabled: "false"
      NEO4J_dbms_ssl_policy_cluster_enabled: "false"
      apoc.initializer.neo4j.0: CREATE CONSTRAINT collection_uuid IF NOT EXISTS FOR (c:Collection) REQUIRE c.uuid IS UNIQUE
      apoc.initializer.neo4j.1: CREATE CONSTRAINT text_uuid IF NOT EXISTS FOR (t:Text) REQUIRE t.uuid IS UNIQUE
      apoc.initializer.neo4j.2: CREATE CONSTRAINT character_uuid IF NOT EXISTS FOR (ch:Character) REQUIRE ch.uuid IS UNIQUE
      apoc.initializer.neo4j.3: CREATE CONSTRAINT annotation_uuid IF NOT EXISTS FOR (a:Annotation) REQUIRE a.uuid IS UNIQUE
      apoc.initializer.neo4j.4: CREATE CONSTRAINT entity_uuid IF NOT EXISTS FOR (e:Entity) REQUIRE e.uuid IS UNIQUE
      apoc.initializer.neo4j.5: CREATE FULLTEXT INDEX search IF NOT EXISTS FOR (n:Entity) ON EACH [n.label]
    deploy:
      resources:
        limits: { cpus: "${NEO4J_CPU:-2}", memory: "${NEO4J_MEMORY:-5G}" }
    networks:
      - awen-internal
      - traefik-public
    volumes:
      - ./neo4j/config:/var/lib/neo4j/conf:rw
      - ./neo4j/data:/var/lib/neo4j/data:rw

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.awen-neo4j.rule=Host(`neo4j.${HOST}`)"
      - "traefik.http.routers.awen-neo4j.entrypoints=websecure"
      - "traefik.http.routers.awen-neo4j.tls.certresolver=external"
      - "traefik.http.services.awen-neo4j.loadbalancer.server.port=7474"
      - "traefik.http.routers.awen-neo4j.service=awen-neo4j"

      - "traefik.tcp.routers.awen-neo4j-bolt.rule=HostSNI(`neo4j.${HOST}`)"
      - "traefik.tcp.routers.awen-neo4j-bolt.tls=true"
      - "traefik.tcp.routers.awen-neo4j-bolt.entrypoints=bolt-raw"
      - "traefik.tcp.services.awen-neo4j-bolt.loadbalancer.server.port=7687"
      - "traefik.tcp.routers.awen-neo4j-bolt.service=awen-neo4j-bolt"

      - "traefik.http.routers.awen-neo4j-bolt-ws.rule=Host(`neo4j.${HOST}`)"
      - "traefik.http.routers.awen-neo4j-bolt-ws.entrypoints=bolt"
      - "traefik.http.routers.awen-neo4j-bolt-ws.tls.certresolver=external"
      - "traefik.http.services.awen-neo4j-bolt-ws.loadbalancer.server.port=7687"
      - "traefik.http.routers.awen-neo4j-bolt-ws.service=awen-neo4j-bolt-ws"

networks:
  awen-internal:
  traefik-public:
    name: traefik-public
