name: entity-manager-dev

services:
  awen-server:
    build:
      context: server
      target: prod
      dockerfile: Dockerfile
      args:
        - APP_VERSION=2026.5.1
    image: em-backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8090:3000"
    volumes:
      - ./config:/awen-config:r
    environment:
      AWEN_APP_NAME: ${AWEN_APP_NAME}
      AWEN_APP_PREFIX: ${AWEN_APP_PREFIX}
      AWEN_APP_FAVICON: ${AWEN_APP_FAVICON}
      AWEN_APP_HOST: ${AWEN_APP_HOST}
      AWEN_GCORE: ${AWEN_GCORE}
      AWEN_GCORE_RAMEN: ${AWEN_GCORE_RAMEN}
      AWEN_GCORE_PROJECT: ${AWEN_GCORE_PROJECT}
      AWEN_DB_HOST: ${AWEN_DB_HOST}
      AWEN_DB_PASSWORD: ${AWEN_DB_PASSWORD}
      AWEN_DB_PORT: ${AWEN_DB_PORT}
      AWEN_DB_USER: ${AWEN_DB_USER}
      AWEN_DB_SCHEME: ${AWEN_DB_SCHEME}
      AWEN_DB_NAME: ${AWEN_DB_NAME}
    networks:
      - traefik-public
      - awen-internal
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.awen-server.rule=(Host(`${THM_HOST}`) || Host(`${HOST}`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.awen-server.tls=true"
      - "traefik.http.routers.awen-server.entrypoints=https"
      - "traefik.http.services.awen-server.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.awenserverauth.basicauth.users=${BASIC_AUTH_STR}"
      - "traefik.http.routers.awen-server.middlewares=awenserverauth"


  awen-client:
    build:
      context: client
      target: prod
      dockerfile: Dockerfile
    image: em-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AWEN_APP_NAME: ${AWEN_APP_NAME}
      AWEN_APP_PREFIX: ${AWEN_APP_PREFIX}
      AWEN_APP_FAVICON: ${AWEN_APP_FAVICON}
      AWEN_APP_HOST: ${AWEN_APP_HOST}
    networks:
      - traefik-public
      - awen-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.awen-client.rule=Host(`${THM_HOST}`) || Host(`${HOST}`)"
      - "traefik.http.routers.awen-client.tls=true"
      - "traefik.http.routers.awen-client.entrypoints=https"
      - "traefik.http.services.awen-client.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.awenclientauth.basicauth.users=${BASIC_AUTH_STR}"
      - "traefik.http.routers.awen-client.middlewares=awenclientauth"



  neo4j:
    container_name: neo4j
    image: neo4j:2026.04
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/var/lib/neo4j/plugins
      - ./neo4j/backups:/var/lib/neo4j/backups
      - ./neo4j/data-abbw:/data
    environment:
      NEO4J_AUTH: neo4j/neo4jadmin
      NEO4J_PLUGINS: '["apoc", "apoc-extended"]'
      apoc.import.file.enabled: 'true'
      NEO4J_dbms_security_procedures_unrestricted: apoc.\\\*,atag.\\\*
      apoc.export.file.enabled: 'true'
      apoc.initializer.neo4j.0: CREATE CONSTRAINT collection_uuid IF NOT EXISTS FOR (c:Collection) REQUIRE c.uuid IS UNIQUE
      apoc.initializer.neo4j.1: CREATE CONSTRAINT text_uuid IF NOT EXISTS FOR (t:Text) REQUIRE t.uuid IS UNIQUE
      apoc.initializer.neo4j.2: CREATE CONSTRAINT character_uuid IF NOT EXISTS FOR (ch:Character) REQUIRE ch.uuid IS UNIQUE
      apoc.initializer.neo4j.3: CREATE CONSTRAINT annotation_uuid IF NOT EXISTS FOR (a:Annotation) REQUIRE a.uuid IS UNIQUE
      apoc.initializer.neo4j.4: CREATE CONSTRAINT entity_uuid IF NOT EXISTS FOR (e:Entity) REQUIRE e.uuid IS UNIQUE
      apoc.initializer.neo4j.5: CREATE FULLTEXT INDEX search IF NOT EXISTS FOR (n:Entity) ON EACH [n.label]
    networks:
      - traefik-public
      - awen-internal
    healthcheck:
      test: /var/lib/neo4j/bin/cypher-shell -u neo4j -p neo4jadmin "show databases;"
      start_period: 20s

networks:
  awen-internal:
  traefik-public:
    name: traefik-public
