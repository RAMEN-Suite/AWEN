name: awen-prod

services:

  proxy:
    container_name: proxy
    image: nginx:alpine
    volumes:
      - ./nginx/nginx-prod.conf:/etc/nginx/nginx.conf
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd
      - ./nginx/logs:/var/log/nginx
      - /certificates/:/etc/nginx/certs
    ports:
      - '80:80'
      - '443:443'
    restart: always
    depends_on:
      - entity-manager


  awen:
    container_name: awen
    hostname: awen
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_VERSION=2026.5.1
    image: awen
    restart: always
    volumes:
      - ./config:/awen-config:r
    environment:
      AWEN_APP_NAME: ${AWEN_APP_NAME}
      AWEN_APP_PREFIX: ${AWEN_APP_PREFIX}
      AWEN_APP_DESCRIPTION: ${AWEN_APP_DESCRIPTION}
      AWEN_APP_FAVICON: ${AWEN_APP_FAVICON}
      AWEN_APP_HOST: ${AWEN_APP_HOST}
      AWEN_SERVER_PORT: ${AWEN_SERVER_PORT}
      AWEN_GCORE: ${AWEN_GCORE}
      AWEN_GCORE_RAMEN: ${AWEN_GCORE_RAMEN}
      AWEN_GCORE_PROJECT: ${AWEN_GCORE_PROJECT}
      AWEN_DB_HOST: ${AWEN_DB_HOST}
      AWEN_DB_PASSWORD: ${AWEN_DB_PASSWORD}
      AWEN_DB_PORT: ${AWEN_DB_PORT}
      AWEN_DB_USER: ${AWEN_DB_USER}
      AWEN_DB_SCHEME: ${AWEN_DB_SCHEME}
      AWEN_DB_NAME: ${AWEN_DB_NAME}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${AWEN_SERVER_PORT:-3000}/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  neo4j:
    container_name: neo4j
    hostname: neo4j
    image: neo4j:2026.04
    restart: always
    ports:
      - "7473:7473"
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/import:/var/lib/neo4j/import:rw
      - ./neo4j/plugins:/var/lib/neo4j/plugins:rw
      - ./neo4j/backups:/var/lib/neo4j/backups:rw
      - ./neo4j/config:/var/lib/neo4j/conf:rw
      - ./neo4j/data:/var/lib/neo4j/data:rw
      - /certificates:/var/lib/neo4j/certificates:rw
    environment:
      apoc.import.file.enabled: 'true'
      NEO4J_dbms_security_procedures_unrestricted: apoc.\\\*,atag.\\\*
      apoc.export.file.enabled: 'true'
      NEO4J_server_default__advertised__address: '${APP_HOST}'
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "2G"
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PW}"
      NEO4J_dbms_security_auth__enabled: "true"
      NEO4J_server_databases_default__to__read__only: "false"
      NEO4J_PLUGINS: '["apoc", "apoc-extended"]'
      NEO4J_dbms_ssl_policy_bolt_enabled: "true"
      NEO4J_dbms_ssl_policy_bolt_base__directory: "certificates"
      NEO4J_dbms_ssl_policy_bolt_private__key: "privkey.pem"
      NEO4J_dbms_ssl_policy_bolt_public__certificate: "fullchain.pem"
      NEO4J_dbms_ssl_policy_bolt_client__auth: "NONE"
      NEO4J_server_bolt_tls__level: "REQUIRED"
      NEO4J_server_https_enabled: "true"
      NEO4J_dbms_ssl_policy_https_enabled: "true"
      NEO4J_dbms_ssl_policy_https_base__directory: "certificates"
      NEO4J_dbms_ssl_policy_https_private__key: "privkey.pem"
      NEO4J_dbms_ssl_policy_https_public__certificate: "fullchain.pem"
      NEO4J_dbms_ssl_policy_https_client__auth: "NONE"
      NEO4J_server_bolt_listen__address: "0.0.0.0:7687"
      NEO4J_server_https_listen__address: "0.0.0.0:7473"
      apoc.initializer.neo4j.0: CREATE CONSTRAINT collection_uuid IF NOT EXISTS FOR (c:Collection) REQUIRE c.uuid IS UNIQUE
      apoc.initializer.neo4j.1: CREATE CONSTRAINT text_uuid IF NOT EXISTS FOR (t:Text) REQUIRE t.uuid IS UNIQUE
      apoc.initializer.neo4j.2: CREATE CONSTRAINT character_uuid IF NOT EXISTS FOR (ch:Character) REQUIRE ch.uuid IS UNIQUE
      apoc.initializer.neo4j.3: CREATE CONSTRAINT annotation_uuid IF NOT EXISTS FOR (a:Annotation) REQUIRE a.uuid IS UNIQUE
      apoc.initializer.neo4j.4: CREATE CONSTRAINT entity_uuid IF NOT EXISTS FOR (e:Entity) REQUIRE e.uuid IS UNIQUE
      apoc.initializer.neo4j.5: CREATE FULLTEXT INDEX search IF NOT EXISTS FOR (n:Entity) ON EACH [n.label]
    healthcheck:
      test: /var/lib/neo4j/bin/cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PW} "show databases;"
      start_period: 20s


