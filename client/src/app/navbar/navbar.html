<p-menubar [model]="items" class="border-noround border-0 bg-gray-200" breakpoint="0px">
  <ng-template #start>
    @if (!isHomeRoute()) {
    <app-back-button />
    }
  </ng-template>
  <ng-template #end>
    @if (header()) {
    <span class="text-2xl">{{ header() }}</span>
    } @else if (entityLoading()) {
    <p-skeleton width="5rem" height="1.5rem" />
    }
  </ng-template>
</p-menubar>
