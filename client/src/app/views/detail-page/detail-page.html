<h1>
  <span>
    {{entity().label}}
  </span>
</h1>

<p-table [value]="entityPropertiesTableFormat()" >
  <ng-template #header>
    <tr>
      <th>Key</th>
      <th>Value</th>
    </tr>
  </ng-template>
  <ng-template #body let-property>
    <tr>
      <td>{{ property.key }}</td>
      <td>{{ property.value }}</td>
    </tr>
  </ng-template>
</p-table>
