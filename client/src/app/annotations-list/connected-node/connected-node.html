<div class="grid m-0">
  <div class="col-3 p-3 bg-gray-50 border-right-1 border-gray-200 flex flex-column gap-2">
    <p-tag [value]="node().node.direction" [severity]="node().directionSeverity" styleClass="text-xs w-fit" />
    <app-node-types [nodeTypes]="node().node.types" class="flex flex-column gap-2" />
  </div>
  <div class="col p-3 flex flex-column gap-2">
    <app-property-list [properties]="node().node.properties" />
  </div>
  <div class="col-fixed w-auto p-1 flex justify-content-end align-items-end">
    <div class="flex flex-row align-items-end">
      <!-- Key Property – mit Link wenn Entity -->
      @if (node().entityLink) {
      <p-split-button
        label="Open Entity"
        (onClick)="navigate(node().entityLink!)"
        severity="primary"
        [model]="annotationConnectionOptions"
        outlined
        size="small"
        dropdownIcon="pi pi-ellipsis-v"
      />
      } @else {
      <p-menu #menuConnectedNode [model]="annotationConnectionOptions" [popup]="true" appendTo="body" />
      <p-button (onClick)="menuConnectedNode.toggle($event)" icon="pi pi-ellipsis-v" text rounded size="small" />
      }
    </div>
  </div>
</div>
