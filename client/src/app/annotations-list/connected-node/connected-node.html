<div
  class="flex flex-row w-full align-items-center border-bottom-1 border-gray-300 text-color"
  [class.border-bottom-none]="!firstEntry()"
  [class.hover:bg-gray-100]="node().entityLink"
  style="min-height: 2rem"
>
  <a class="flex flex-row w-full align-items-center no-underline text-color" [routerLink]="node().entityLink">
    <div class="flex w-2 p-2 py-3 border-right-1 border-gray-300 justify-content-center">
      <i class="pi" [class]="node().directionIcon"></i>
    </div>

    <div class="flex flex-row w-full px-2 align-items-center align-content-center">
      <div class="flex flex-column w-5">
        <app-node-types [nodeTypes]="node().node.types" asChips hideRamenCoreTypes />
      </div>

      <div class="flex flex-column w-full">{{ title() }}</div>
    </div>
  </a>

  @if (node().id; as nodeId) {
    <div class="flex flex-column justify-content-end px-2">
      <p-button
        (onClick)="clickDeleteAnnotationRelation(annotationId(), nodeId, $event)"
        icon="pi pi-trash"
        severity="danger"
        outlined
        size="small"
      />
    </div>
  }
</div>
