<div class="flex flex-column gap-2">
  @for (property of visibleProperties(properties()); track property.name) {
  <div class="flex flex-row align-items-center">
    <div class="flex w-4 flex-wrap" [class]="textSizeClass()" style="word-break: normal; overflow-wrap: anywhere">{{ property.name }}</div>
    <div class="flex w-1 justify-content-center">:</div>
    <div class="flex w-7 align-items-center">
      @if (isArrayValue(property.value)) {
      <div class="flex flex-wrap gap-1">
        @for (value of property.value; track $index) {
        <p-chip [class]="textSizeClass()" [label]="displayValue(value)" class="py-1" />
        }
      </div>
      } @else {
      <span class="font-light" style="font-stretch: semi-expanded; word-break: normal; overflow-wrap: anywhere" [class]="textSizeClass()">
        {{ displayValue(property.value) }}
      </span>
      }
    </div>
  </div>
  } @empty {
  <span class="text-gray-500" [class]="textSizeClass()">No properties</span>
  }
</div>
