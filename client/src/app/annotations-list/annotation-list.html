<div class="flex flex-row justify-content-end gap-2">
  <p-button (onClick)="expandAll()" severity="secondary" outlined label="expand all" icon="pi pi-chevron-down" />
  <p-button (onClick)="closeAll()" severity="secondary" outlined label="colapse all" icon="pi pi-chevron-up" />
</div>
<p-accordion [multiple]="true" class="w-full" [value]="activeAccordionPanels()" (valueChange)="setActiveAccordionPanels($event)">
  @for (group of groupedAnnotations(); track group.type) {
  <p-accordion-panel [value]="group.type">
    <p-accordion-header>
      <div class="w-full flex align-items-center gap-3 text-color">
        <span class="text-xl font-bold">{{ group.type }}</span>
        <p-chip class="text-sm" [label]="group.annotations.length.toString()" />
      </div>
    </p-accordion-header>
    <p-accordion-content>
      <div class="col-12 mx-0 flex flex-column gap-3">
        @for (annotation of group.annotations; track annotation.id) {
        <app-annotation-card [annotation]="annotation" />
        }
      </div>
    </p-accordion-content>
  </p-accordion-panel>
  }
</p-accordion>
