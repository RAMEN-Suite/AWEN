<p-toast>
  <ng-template let-message pTemplate="message">
    <div class="p-toast-message-text">
      <span class="p-toast-summary">{{ message.summary }}</span>
      <div class="p-toast-detail" [innerHTML]="message.detail"></div>
    </div>
  </ng-template>
</p-toast>
<p-confirm-dialog />

<div>
  <div #appContent (scroll)="onContentScroll($event)">
    @if (loaded()) {
    <router-outlet />
    } @else {
    <div class="loading-wrapper">
      <p-progress-spinner ariaLabel="loading" />
    </div>
    }
  </div>
</div>

<!-- Scroll-to-top Button -->
<p-button
  class="scroll-top-btn"
  [class.visible]="showScrollTop"
  icon="pi pi-arrow-up"
  severity="help"
  outlined
  rounded
  (onClick)="scrollToTop()"
/>

<p-menubar class="configMenuBar">
  <ng-template #end>
    <div class="flex items-center gap-2 h-3rem">
      <p-button styleClass="h-3rem" severity="secondary" icon="pi pi-cog" size="large" outlined [routerLink]="['config']" />
    </div>
  </ng-template>

  <ng-template #start>
    <div class="flex items-center gap-2 h-3rem">
      <a
        pButton
        class="no-underline h-3rem"
        size="small"
        severity="secondary"
        outlined
        [href]="'https://github.com/THM-Graphs/entity-manager'"
        target="_blank"
      >
        <div pButtonLabel class="flex flex-column justify-content-start text-left gap-1">
          <span>Entity Manager</span>
          <small>Version {{ version() }}</small>
        </div>
      </a>
    </div>
  </ng-template>
</p-menubar>
