<form *transloco="let t" [formGroup]="configForm" class="flex flex-column gap-2">
  <p-floatlabel class="w-full" variant="on">
    <p-multi-select
      formControlName="entityTypes"
      [options]="entityTypes()"
      display="chip"
      id="config_entity_types_ms"
      [maxSelectedLabels]="10"
      fluid
    />
    <label for="config_entity_types_ms">{{ t("app.shared.configPane.entityTypes.label") }}</label>
    <small>{{ t("app.shared.configPane.entityTypes.help") }}</small>
  </p-floatlabel>
  <p-floatlabel class="" variant="on">
    <p-select
      formControlName="selectedCollectionChain"
      [options]="collectionChains()"
      class="w-full md:w-80"
      id="config_collection_chain_s"
      fluid
    >
      <ng-template let-collectionChain #item>
        <div class="flex items-center gap-2">
          <div>{{ displayCollectionChain(collectionChain) }}</div>
        </div>
      </ng-template>
    </p-select>
    <label for="config_collection_chain_s">{{ t("app.shared.configPane.collectionChain.label") }}</label>
    <small>{{ t("app.shared.configPane.collectionChain.help") }}</small>
  </p-floatlabel>
  <p-floatlabel class="" variant="on">
    <p-multi-select
      formControlName="filterableCollections"
      [options]="configForm.controls.selectedCollectionChain.value"
      class="w-full md:w-80"
      display="chip"
      id="config_collection_chain_ms"
      [maxSelectedLabels]="4"
      fluid
    >
    </p-multi-select>
    <label for="config_collection_chain_ms">{{ t("app.shared.configPane.collectionTypes.label") }}</label>
    <small>{{ t("app.shared.configPane.collectionTypes.help") }}</small>
  </p-floatlabel>
</form>
