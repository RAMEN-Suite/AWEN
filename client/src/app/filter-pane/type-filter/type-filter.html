<div class="formgrid grid flex gap-3">
  @for (type of types(); track $index) {
  <div class="field col-fixed w-auto flex align-items-center align-content-center items-center gap-2">
    <p-checkbox [value]="type" [(ngModel)]="activeTypes" [inputId]="type" />
    <label [for]="type" class="p-0 m-0"> {{ type | titlecase }} </label>
  </div>
  }
</div>
