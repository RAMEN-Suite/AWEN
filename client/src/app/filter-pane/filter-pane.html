<form [formGroup]="form" (ngSubmit)="onSubmit()" class="formgrid grid">
  <div class="field col-12">
    <p-auto-complete
      formControlName="label"
      [suggestions]="suggestions()"
      [invalid]="form.controls.label.invalid && form.controls.label.touched"
      (completeMethod)="autocompleteChanges($event)"
      (onSelect)="onItemSelect($event)"
      fluid
      [showEmptyMessage]="showEmptyMessage()"
      optionLabel="label"
      panelStyleClass="w-30rem"
    >
      <ng-template let-entity #item>
        <a [routerLink]="['entity', entity.id]" class="flex items-center gap-2">
          <span class="text-black-alpha-90">{{ entity.label }}</span>
        </a>
      </ng-template>
    </p-auto-complete>
    @if (form.controls.label.invalid && form.controls.label.touched) {
      <p-message severity="error" size="small" variant="simple">Value is required to be longer then three characters.
      </p-message>
    }
  </div>
  @for (input of collectionFilterOptions(); track $index) {
    <form [formGroup]="form.controls.collectionFilter" class="field col-12 md:col">
      <p-select
        [options]="input.values"
        [formControlName]="input.type"
        optionLabel="label"
        [placeholder]="'Select a ' + input.type"
        showClear
        class="w-full"/>
    </form>
  }
  <div class="field col-12">
    <app-type-filter [(form)]="form.controls.types"/>
  </div>
  <div class="field col-12 flex justify-content-end">
    <p-button type="submitt" label="Search"/>
  </div>
</form>
