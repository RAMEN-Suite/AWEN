<div class="my-2">
  <p-floatlabel variant="on" class="field">
    <p-select
      appendTo="body"
      [formControl]="typeInput"
      [options]="types()"
      [filter]="true"
      [showClear]="true"
      [loading]="!typesLoaded()"
      fluid
      style="min-width: 12rem"
      id="create-entity-form_type-input"
    />
    <label for="create-entity-form_type-input">Entity-Type</label>
  </p-floatlabel>
  <app-attribute-form [formName]="typeInput.value" [properties]="properties()" />
  <div class="field justify-content-end flex" [class]="typeInput.value === '' ? 'hidden':''">
    <p-button (onClick)="clickCreateButton()" size="large" label="Create" [disabled]="propertiesForm().invalid" />
  </div>
</div>
